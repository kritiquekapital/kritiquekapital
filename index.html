<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.oCam</title>

  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script
  defer
  src="https://cloud.umami.is/script.js"
  data-website-id="2828c034-f1fe-4f26-9807-8cfe87875bd7"
  data-domains="kritiquekapital.com,www.kritiquekapital.com"
  data-exclude-search="true"
  data-exclude-hash="true"
  data-do-not-track="true"
  data-performance="true"
></script>

  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/apple-touch-icon.png">
  <link rel="mask-icon" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="css/radial.css">
</head>
<body>
  <main class="site-shell">
    <section class="radial-stage" id="radialStage">
    <div id="radial" class="radial">
      <button class="center" id="centerHub" aria-label="Return to home view">
        <span class="center-core">.oCam</span>
        <span class="center-sub">choose a direction</span>
      </button>

      <button class="slice slice-marketing" data-section="marketing" data-angle="0">
        <span class="slice-label">marketing</span>
      </button>

      <button class="slice slice-creative" data-section="creative" data-angle="60">
        <span class="slice-label">creative</span>
      </button>

      <button class="slice slice-resume" data-section="resume" data-angle="120">
        <span class="slice-label">resume</span>
      </button>

      <button class="slice slice-global-cultures" data-section="global-cultures" data-angle="180">
        <span class="slice-label">writing</span>
      </button>

      <button class="slice slice-placeholder" data-section="placeholder" data-angle="240">
        <span class="slice-label">film</span>
      </button>

      <button class="slice slice-about" data-section="about" data-angle="300">
        <span class="slice-label">about</span>
      </button>
    </div>

      <div id="contentLayer" class="content-layer" aria-live="polite"></div>

      <button id="backButton" class="back-button" aria-label="Go back">
        back
      </button>
    </section>
  </main>

  <footer class="site-footer">
    <span>© .oCam Studios</span>
  </footer>

  <script type="module" src="js/radial.js"></script>
</body>
</html>
